name: Deployment
on:
  push:
    branches:
      - main
jobs:
  cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install NodeJS
        uses: actions/setup-node@v1
        with:
          node-version: "16.x"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npx ng build --base-href=/Japan-Jegyzetek/
      - name: Deploy
        run: npx ng deploy --repo=https://github.com/racz16/Japan-Jegyzetek.git --name="racz16" --email=racz1666@gmail.com
